on:
  push:
    branches:
      - main

jobs:
  wordpress-wpscan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start WordPress Environment
        # We tell Docker to use the compose file located in your /docker folder
        run: |
          docker compose -f docker/docker-compose.yml up -d

      - name: Wait for WordPress to be ready
        run: |
          echo "Waiting for WordPress to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/wp-content/ | grep -q "<title>"; then
              echo "WordPress is ready!"
              break
            fi
            sleep 5
          done

      - name: Run WPScan via Docker
        run: |
          docker run --rm --network host wpscanteam/wpscan \
            --url http://localhost:8080 \
            --enumerate u,vp,vt \
            --force || true
