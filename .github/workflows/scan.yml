on:
  push:
    branches:
      - main

jobs:
  wordpress-wpscan:
    runs-on: ubuntu-latest
    env:
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      WORDPRESS_DB_PASSWORD: ${{ secrets.WORDPRESS_DB_PASSWORD }}
      MYSQL_DATABASE: ${{ vars.MYSQL_DATABASE }}
      MYSQL_USER: ${{ vars.MYSQL_USER }}
      WORDPRESS_DB_HOST: ${{ vars.WORDPRESS_DB_HOST }}
      WORDPRESS_DB_USER: ${{ vars.WORDPRESS_DB_USER }}
      WORDPRESS_DB_NAME: ${{ vars.WORDPRESS_DB_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start WordPress Environment
        run: |
          docker compose up --build --wait

      - name: Complete WordPress Installation via WP-CLI
        env:
          WP_ADMIN_PASSWORD: ${{ secrets.WP_ADMIN_PASSWORD }}
          WP_ADMIN_USER: ${{ secrets.WP_ADMIN_USER }}
          WP_ADMIN_EMAIL: ${{ secrets.WP_ADMIN_EMAIL }}
        run: |
          docker exec wp-site curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          docker exec wp-site chmod +x wp-cli.phar

          docker exec --user www-data wp-site ./wp-cli.phar core install \
            --url="http://localhost:8080" \
            --title="WPScan Test Site" \
            --admin_user="${WP_ADMIN_USER}" \
            --admin_password="${WP_ADMIN_PASSWORD}" \
            --admin_email="${WP_ADMIN_EMAIL}" \
            --skip-email

      - name: Run WPScan via Docker
        run: |
          docker run --rm --network host wpscanteam/wpscan \
            --url http://localhost:8080 \
            --enumerate u,vp,vt \
            --clear-cache \
            --api-token ${{ secrets.WPSCAN_SECRET }} \
            --force | tee scans/wpscan-artifact.txt

      - name: Upload WPScan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wpscan-results
          path: scans/wpscan-artifact.txt

      - name: Cleanup
        if: always()
        run: |
          docker compose down
